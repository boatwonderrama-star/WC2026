name: Update World Cup Table

on:
  schedule:
    - cron: '0 0 * * *' # รันอัตโนมัติทุกวันเวลา 07:00 น. เวลาไทย
  workflow_dispatch:   # เปิดสวิตช์ให้กดรันเองด้วยมือได้

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # ถ้าโค้ดของคุณต้องใช้ requests ให้เอาเครื่องหมาย # หน้าบรรทัดล่างออก
        # pip install requests

    - name: Run build script
      run: python scripts/build.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update table data" && git push)
